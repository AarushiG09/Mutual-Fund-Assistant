<body class="font-body-md text-body-md h-screen flex overflow-hidden">
    <div id="root" class="w-full h-full flex"></div>

    <script type="text/babel">
        const BACKEND_URL = '';

        function renderFormattedText(text) {
            if (!text) return null;
            const parts = text.split('**');
            return parts.map((part, idx) => {
                if (idx % 2 === 1) {
                    return <span key={idx} className="text-secondary font-semibold">{part}</span>;
                }
                return part;
            });
        }

        function App() {
            // State variables
            const [query, setQuery] = React.useState("");
            const [chatLog, setChatLog] = React.useState([
                {
                    role: "assistant",
                    content: "Hello! I am your facts-only Groww HDFC Mutual Fund Assistant. Ask me any factual question about the 5 monitored HDFC schemes (NAV, Exit Load, Expense Ratio, Min SIP, Riskometer, Benchmark, or Manager narratives). Please note that I cannot provide investment advice or fund comparisons.",
                    source_url: null,
                    last_updated: null,
                    status: "success",
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }
            ]);
            const [loading, setLoading] = React.useState(false);
            const [stats, setStats] = React.useState({
                schemes_count: 5,
                managers_count: 0,
                llm_provider: "groq",
                llm_model: "llama-3.1-70b-versatile"
            });
            const [schemes, setSchemes] = React.useState([]);
            const chatEndRef = React.useRef(null);

            // Fetch dynamic db information on load
            React.useEffect(() => {
                fetch(`${BACKEND_URL}/api/v1/stats`)
                    .then(res => res.json())
                    .then(data => setStats(data))
                    .catch(err => console.error("Error loading RAG statistics:", err));

                fetch(`${BACKEND_URL}/api/v1/schemes`)
                    .then(res => res.json())
                    .then(data => setSchemes(data))
                    .catch(err => console.error("Error loading schemes:", err));

                // Mouse movement listener for ambient radial mesh glows
                const handleMouseMove = (e) => {
                    const glow = document.getElementById('mesh-glow-2');
                    if (glow) {
                        const moveX = (e.clientX - window.innerWidth / 2) / 60;
                        const moveY = (e.clientY - window.innerHeight / 2) / 60;
                        glow.style.transform = `translate(${moveX}px, ${moveY}px)`;
                    }
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            // Scroll to end of feed
            React.useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatLog, loading]);

            // Submit query handler
            const handleQuerySubmit = async (searchQuery) => {
                const activeQuery = searchQuery || query;
                if (!activeQuery.trim()) return;

                setQuery("");

                // Add User Bubble
                const userMsg = {
                    role: "user",
                    content: activeQuery,
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                setChatLog(prev => [...prev, userMsg]);
                setLoading(true);

                try {
                    const res = await fetch(`${BACKEND_URL}/api/v1/chat`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ query: activeQuery })
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.detail || "Error communicating with server.");
                    }

                    // Add Assistant Bubble
                    setChatLog(prev => [...prev, {
                        role: "assistant",
                        content: data.answer,
                        source_url: data.source_url,
                        last_updated: data.last_updated,
                        status: data.status,
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    }]);
                } catch (err) {
                    console.error(err);
                    setChatLog(prev => [...prev, {
                        role: "assistant",
                        content: `System error occurred while generating answer: ${err.message}`,
                        source_url: null,
                        last_updated: null,
                        status: "error",
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            const triggerSuggestion = (q) => {
                handleQuerySubmit(q);
            };

            const handleNewAnalysis = () => {
                setChatLog([
                    {
                        role: "assistant",
                        content: "Hello! I am your facts-only Groww HDFC Mutual Fund Assistant. Ask me any factual question about the 5 monitored HDFC schemes (NAV, Exit Load, Expense Ratio, Min SIP, Riskometer, Benchmark, or Manager narratives). Please note that I cannot provide investment advice or fund comparisons.",
                        source_url: null,
                        last_updated: null,
                        status: "success",
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    }
                ]);
            };

            return (
                <React.Fragment>

                            <div className="flex flex-wrap gap-xs">
                                <button 
                                    onClick={() => setQuery("What is the exit load of HDFC Defence Fund?")}
                                    className="bg-surface-variant/40 hover:bg-surface-variant/80 text-on-surface font-label-xs py-1.5 px-3 rounded-full border border-white/5 transition-all"
                                >
                                    Exit Load
                                </button>
                                <button 
                                    onClick={() => setQuery("Who is the fund manager of HDFC Mid Cap Fund?")}
                                    className="bg-surface-variant/40 hover:bg-surface-variant/80 text-on-surface font-label-xs py-1.5 px-3 rounded-full border border-white/5 transition-all"
                                >
                                    Fund Manager
                                </button>
                                <button 
                                    onClick={() => setQuery("What is the expense ratio of HDFC Small Cap Fund?")}
                                    className="bg-surface-variant/40 hover:bg-surface-variant/80 text-on-surface font-label-xs py-1.5 px-3 rounded-full border border-white/5 transition-all"
                                >
                                    Expense Ratio
                                </button>
                            </div>
                            
                            <button 
                                onClick={handleNewAnalysis}
                                className="mt-base btn-gradient text-white font-label-sm font-bold py-3 rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/30 transition-all active:scale-95 flex items-center justify-center gap-2"
                            >
                                <span className="material-symbols-outlined">add</span>
                                New Analysis
                            </button>
                        </div>
                    </aside>

                    {/* Main Content Pane */}
                    <main className="flex-1 flex flex-col relative overflow-hidden h-screen bg-surface-container-lowest">
                        {/* Top Header bar with compliance validation badge */}
                        <header className="flex justify-between items-center px-lg py-md w-full bg-surface/80 backdrop-blur-lg border-b border-white/5 z-40 flex-shrink-0">
                            <div className="flex items-center gap-lg">
                                <h2 className="font-display-lg text-headline-md font-black text-primary">FAQ Query Session</h2>
                                <div className="flex items-center gap-md">
                                    <a className="font-label-sm text-primary border-b-2 border-primary pb-1" href="#">Expert Mode</a>
                                    <a className="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Fund Insights</a>
                                </div>
                            </div>
                            <div className="flex items-center gap-md">
                                <div className="bg-primary/5 border border-primary/20 px-4 py-1.5 rounded-full flex items-center gap-2">
                                    <span className="material-symbols-outlined text-primary text-sm">warning</span>
                                    <span className="font-label-xs text-primary uppercase tracking-wide">FACTS-ONLY ASSISTANT. NO INVESTMENT ADVICE.</span>
                                </div>
                                <div className="flex items-center gap-sm">
                                    <span className="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer transition-colors">notifications</span>
                                    <span className="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer transition-colors">help_outline</span>
                                    <div className="h-8 w-8 rounded-full overflow-hidden border border-primary/30">
                                        <img alt="User Profile" className="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8dJJjVBxntCte61ZWJz36Q5LjH461TDN9iVkoLni1Xi63-t2z5JjYN52-ImTqQDP0QOnEZrG4dZSRBQfrNOsy-OizHwMRrzLphKLKw-IC-BdF1tG3rhIgMnzL2uIlOnuOLe2r75GiScTIEUV2qi-aZ0x5cYZIJXNBLcTj1_WN_qlSc8s3X-dr-2MhOFH-8ASGPc1Nkl2ZQsByuQpK2tLueNIPZ24QaXlPrXnJLZGGEtk4oBKvJhYDordahEnLOGZSxuiLFCgjG12O"/>
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* Conversational Scroll Area */}
                        <div className="flex-1 overflow-y-auto p-lg flex flex-col gap-lg max-w-5xl mx-auto w-full pb-32 custom-scrollbar bg-slate-950/20">
                            {chatLog.map((msg, index) => {
                                const isAssistant = msg.role === "assistant";
                                const isRefusal = isAssistant && (msg.status && msg.status.startsWith("refused"));

                                if (!isAssistant) {
                                    // User bubble styling matching Snap1
                                    return (
                                        <div key={index} className="flex flex-col items-end gap-base animate-in fade-in slide-in-from-right-4 duration-500 w-full">
                                            <div className="bg-surface-container-highest rounded-2xl rounded-tr-none p-md max-w-[70%] border border-white/5 shadow-lg text-right">
                                                <p className="font-body-md text-on-surface">{msg.content}</p>
                                            </div>
                                            <span className="font-label-xs text-on-surface-variant">Sent {msg.timestamp}</span>
                                        </div>
                                    );
                                }

                                // Assistant bubble styling matching Snap1 and Snap2
                                return (
                                    <div key={index} className="flex flex-col items-start gap-base animate-in fade-in slide-in-from-left-4 duration-500 w-full">
                                        <div className={`glass-panel rounded-2xl rounded-tl-none p-md max-w-[70%] border shadow-lg text-left ${
                                            isRefusal 
                                                ? "bg-secondary/5 border-secondary/20 border-l-4 border-secondary" 
                                                : "border-primary/20 border-l-4 border-primary"
                                        }`}>
                                            {/* Header Badge */}
                                            <div className="mb-sm">
                                                {isRefusal ? (
                                                    <span className="text-[10px] bg-secondary/10 text-secondary px-1.5 py-0.5 rounded border border-secondary/20 font-bold flex items-center gap-1 w-max">
                                                        <span className="material-symbols-outlined text-[12px]">gavel</span>
                                                        COMPLIANCE REFUSAL
                                                    </span>
                                                ) : (
                                                    <span className="text-[10px] bg-primary/10 text-primary px-1.5 py-0.5 rounded border border-primary/20 font-bold flex items-center gap-1 w-max">
                                                        <span className="material-symbols-outlined text-[12px]" style={{ fontVariationSettings: "'FILL' 1" }}>verified</span>
                                                        VERIFIED FACT
                                                    </span>
                                                )}
                                            </div>

                                            {/* Answer Content */}
                                            <p className="font-body-md text-on-surface">{renderFormattedText(msg.content)}</p>

                                            {/* Citation & date updated block */}
                                            {(msg.source_url || msg.last_updated) && (
                                                <div className="mt-base pt-base border-t border-white/5 flex justify-between items-center text-xs text-on-surface-variant gap-lg">
                                                    {msg.source_url && (
                                                        isRefusal ? (
                                                            <a 
                                                                href={msg.source_url} 
                                                                target="_blank" 
                                                                rel="noopener noreferrer" 
                                                                className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-secondary/10 hover:bg-secondary/20 text-secondary text-xs font-semibold rounded-lg border border-secondary/20 transition-all active:scale-95"
                                                            >
                                                                <span className="material-symbols-outlined text-[16px]">
                                                                    {msg.source_url.includes("amfiindia") ? "auto_stories" : "gavel"}
                                                                </span>
                                                                {msg.source_url.includes("amfiindia") ? "AMFI Education Portal" : "SEBI Portal"}
                                                                <span className="material-symbols-outlined text-[14px]">north_east</span>
                                                            </a>
                                                        ) : (
                                                            <a 
                                                                href={msg.source_url} 
                                                                target="_blank" 
                                                                rel="noopener noreferrer" 
                                                                className="hover:underline font-bold flex items-center gap-1 text-primary"
                                                            >
                                                                <span className="material-symbols-outlined text-[14px]">open_in_new</span>
                                                                Source Scheme Page
                                                            </a>
                                                        )
                                                    )}
                                                    {msg.last_updated && (
                                                        <span>Last updated: {msg.last_updated}</span>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                            
                            {/* Loader */}
                            {loading && (
                                <div className="flex flex-col items-start gap-base w-full">
                                    <div className="glass-panel rounded-2xl rounded-tl-none p-md max-w-[70%] border border-primary/20 shadow-lg text-left flex items-center gap-3">
                                        <div className="w-6 h-6 text-primary animate-spin flex items-center justify-center shrink-0">
                                            <span className="material-symbols-outlined text-sm">progress_activity</span>
                                        </div>
                                        <div className="text-on-surface-variant text-sm italic">
                                            Consulting database indices and checking compliance policies...
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        {/* Bottom Input Area */}
                        <footer className="w-full max-w-3xl mx-auto pb-8 px-6 space-y-4 flex-shrink-0 z-10">
                            <div className="relative group">
                                <div className="relative glass-panel rounded-full flex items-center p-base px-md border-white/10 focus-within:border-primary/50">
                                    <span className="material-symbols-outlined text-primary mr-base" style={{ fontVariationSettings: "'FILL' 1" }}>smart_toy</span>
                                    <input 
                                        type="text"
                                        value={query}
                                        onChange={(e) => setQuery(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') handleQuerySubmit();
                                        }}
                                        disabled={loading}
                                        placeholder="Ask about NAV, exit load, fund managers, expense ratio..."
                                        className="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant font-body-md py-2 focus:outline-none focus:border-none focus:ring-transparent"
                                    />
                                    <div className="flex items-center gap-md">
                                        <span className="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer">mic</span>
                                        <button 
                                            onClick={() => handleQuerySubmit()}
                                            disabled={loading || !query.trim()}
                                            className="h-10 w-10 btn-gradient rounded-full flex items-center justify-center text-white hover:scale-105 active:scale-95 transition-all shadow-lg shadow-primary/30 disabled:opacity-50 disabled:scale-100"
                                        >
                                            <span className="material-symbols-outlined text-white" style={{ fontVariationSettings: "'FILL' 1" }}>send</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-sm flex justify-center gap-lg text-left">
                                <span className="font-label-xs text-on-surface-variant flex items-center gap-1">
                                    <span className="material-symbols-outlined text-[12px] text-secondary">info</span>
                                    Data verified against official AMC factsheets
                                </span>
                                <span className="font-label-xs text-on-surface-variant flex items-center gap-1">
                                    <span className="material-symbols-outlined text-[12px] text-secondary">bolt</span>
                                    Real-time NAV updates enabled
                                </span>
                            </div>
                            <p className="text-center text-[10px] text-slate-600 leading-relaxed uppercase tracking-wider font-medium">
                                Disclaimer: groww-factor provides data sourced from AMC portals. It is not an investment advisory platform.
                            </p>
                        </footer>

                        {/* Ambient Radial Mesh Glows */}
                        <div className="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] overflow-hidden">
                            <div className="absolute top-[10%] right-[5%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[120px] animate-pulse"></div>
                            <div className="absolute bottom-[20%] left-[20%] w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[150px] transition-transform duration-10000" id="mesh-glow-2"></div>
                        </div>
                    </main>
                </React.Fragment>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
