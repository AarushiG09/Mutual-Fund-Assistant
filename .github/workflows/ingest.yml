name: Manual & Scheduled Data Ingestion

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  schedule:
    # Runs at 10:00 AM IST daily (which is 4:30 AM UTC)
    - cron: '30 4 * * *'

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion
        run: python -m src.data.ingest

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Commit and push only if the database files have actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update database from ingestion run" && git push)
